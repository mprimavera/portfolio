name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # or whatever your default branch is

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          path: .


      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        working-directory: ./

      - name: Check dist folder
        run: ls -R

      - name: Deploy to mprimavera.github.io
        
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PORTFOLIO_DEPLOYMENT }}
          publish_dir: ./dist
          external_repository: mprimavera/mprimavera.github.io
          publish_branch: main
        

